info:
  name: Apply collaborative playlist edit operation
  type: http
  seq: 4

http:
  method: POST
  url: "{{domain}}{{port}}{{baseUrl}}/playlists/:playlistId/edits"
  params:
    - name: playlistId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "operation": "move",
        "track_entry_id": 0,
        "target_position": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
