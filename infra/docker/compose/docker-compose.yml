services:
  api:
    build:
      context: ../../../api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Delete the volume and command when ready for production
    volumes:
      - ../../../api/app:/api/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--no-access-log"]
    networks:
      - vitrolify-observability
      - vitrolify-db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - vitrolify-db

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - vitrolify-observability

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    networks:
      - vitrolify-observability

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle-data:/data
    ports:
      - 8888:8080
    networks:
      - vitrolify-observability

  k6:
    image: grafana/k6:0.52.0
    profiles: ["test"]
    depends_on:
      api:
        condition: service_started
    volumes:
      - ../k6:/scripts:ro
    environment:
      K6_API_BASE_URL: http://api:8000/api/v1
    entrypoint: ["k6"]
    networks:
      - vitrolify-observability


volumes:
  db-data:
  dozzle-data:

networks:
  vitrolify-db:
    internal: true
  vitrolify-observability:
    driver: bridge
