# Workflow de varredura de segredos.
# Detecta chaves de API, tokens, senhas e credenciais que tenham sido commitadas
# por engano no repositorio. Bloqueia o merge do PR se encontrar qualquer segredo.
name: Secret Scan

# Gatilhos que disparam este workflow
on:
  # Roda a cada push nas branches principais
  push:
    branches: [main, development]
  # Roda a cada pull request (bloqueio antes do merge)
  pull_request:
  # Varredura completa do historico toda segunda-feira as 06:00 UTC
  # Util para pegar segredos antigos que passaram antes deste workflow existir
  schedule:
    - cron: "0 6 * * 1"

# Cancela execucoes em duplicata na mesma branch para economizar minutos de CI
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

# Permissoes minimas: so precisa ler o codigo do repositorio
permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      # Baixa o codigo do repositorio
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 baixa todo o historico git
          # Necessario para o scan semanal varrer commits antigos
          fetch-depth: 0

      # Executa o Gitleaks - ferramenta padrao do mercado para detectar segredos
      # Identifica 100+ padroes conhecidos (AWS, GCP, Firebase, tokens, etc)
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Token padrao do GitHub (necessario pela action, ja vem configurado)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Se detectar segredos, o job falha automaticamente (hard-fail).
          # E o que a constituicao do projeto exige: segredos NAO podem ser commitados.
          # Salva o relatorio detalhado em JSON como artifact para download
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          # Mostra resumo legivel na aba de summary do workflow no GitHub
          GITLEAKS_ENABLE_SUMMARY: true
