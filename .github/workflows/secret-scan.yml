# Workflow de varredura de segredos.
# Detecta chaves de API, tokens, senhas e credenciais que tenham sido commitadas
# por engano no repositorio. Bloqueia o merge do PR se encontrar qualquer segredo.
name: Secret Scan

# Gatilhos que disparam este workflow
on:
  # Roda a cada push nas branches principais
  push:
    branches: [main, development]
  # Roda a cada pull request (bloqueio antes do merge)
  pull_request:
  # Varredura completa do historico toda segunda-feira as 06:00 UTC
  # Util para pegar segredos antigos que passaram antes deste workflow existir
  schedule:
    - cron: "0 6 * * 1"

# Cancela execucoes em duplicata na mesma branch para economizar minutos de CI
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

# Permissoes minimas: so precisa ler o codigo do repositorio
permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      # Baixa o codigo do repositorio com todo o historico para que o
      # scan agendado consiga analisar commits antigos.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Instala o binario oficial do Gitleaks (open source, gratuito).
      # Nao usamos a action gitleaks-action@v2 porque ela exige licenca
      # paga em repositorios de organizacao - o binario direto nao tem
      # essa restricao e roda exatamente as mesmas regras.
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Executa o Gitleaks varrendo todo o historico.
      # --redact: oculta os segredos no log (so mostra hash) para o log
      #     publico do CI nao expor o segredo encontrado.
      # --verbose: detalha o que esta sendo varrido.
      # --exit-code 1: retorna codigo de erro se achar segredo (hard-fail).
      # --report-format / --report-path: gera relatorio JSON para artifact.
      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source="." \
            --redact \
            --verbose \
            --exit-code=1 \
            --report-format=json \
            --report-path=gitleaks-report.json

      # Salva o relatorio JSON como artifact para download caso falhe.
      # if: failure() garante que so envia se o passo anterior achou algo.
      - name: Upload Gitleaks report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30
